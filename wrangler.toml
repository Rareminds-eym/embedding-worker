name = "embedding-worker"
main = "src/index.ts"
compatibility_date = "2025-03-20"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 9004
inspector_port = 9230

[observability]
enabled = true

# ============================================================================
# LOCAL  →  wrangler dev  (uses preview_id for KV, secrets from .dev.vars)
# ============================================================================
[ai]
binding = "AI"

[vars]
ENVIRONMENT = "local"
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:8788,http://127.0.0.1:5173,http://127.0.0.1:8788"

[[kv_namespaces]]
binding    = "EMBEDDING_KV"
id         = "REPLACE_WITH_LOCAL_KV_ID"      # local dev — replace with your actual local KV namespace ID
preview_id = "REPLACE_WITH_LOCAL_KV_ID"      # used by wrangler dev; same as id for local

# KV key schema:
#   tenant:<id>                        → TenantConfig JSON
#   api_keys:<sha256>                  → ApiKeyRecord JSON
#   tenant_keys:<tenantId>:<sha256>    → "1" (reverse index for O(n) tenant key deletion)
#   lock:tenant:<id>                   → "1" (TTL 60s, creation lock)
#   rl:<tenantId>:<endpoint>:<window>  → request count (TTL 120s, rate limiting)

# wrangler secret put ADMIN_KEY
# wrangler secret put VOYAGE_API_KEY
# wrangler secret put OPENAI_API_KEY

# ============================================================================
# DEVELOPMENT  →  wrangler deploy --env dev
# ============================================================================
[env.dev]
[env.dev.ai]
binding = "AI"

[env.dev.vars]
ENVIRONMENT = "dev"
ALLOWED_ORIGINS = "https://dev.skillpassports.com"

[[env.dev.kv_namespaces]]
binding = "EMBEDDING_KV"
id = "REPLACE_WITH_DEV_KV_ID"

# wrangler secret put ADMIN_KEY      --env dev
# wrangler secret put VOYAGE_API_KEY --env dev
# wrangler secret put OPENAI_API_KEY --env dev

# ============================================================================
# STAGING  →  wrangler deploy --env staging
# ============================================================================
[env.staging]
[env.staging.ai]
binding = "AI"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGINS = "https://stag.skillpassports.com"

[[env.staging.kv_namespaces]]
binding = "EMBEDDING_KV"
id = "REPLACE_WITH_STAGING_KV_ID"

# wrangler secret put ADMIN_KEY      --env staging
# wrangler secret put VOYAGE_API_KEY --env staging
# wrangler secret put OPENAI_API_KEY --env staging

# ============================================================================
# PRODUCTION  →  wrangler deploy --env production
# ============================================================================
[env.production]
[env.production.ai]
binding = "AI"

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://skillpassport.com,https://www.skillpassport.com"

[[env.production.kv_namespaces]]
binding = "EMBEDDING_KV"
id = "REPLACE_WITH_PRODUCTION_KV_ID"

# wrangler secret put ADMIN_KEY      --env production
# wrangler secret put VOYAGE_API_KEY --env production
# wrangler secret put OPENAI_API_KEY --env production
