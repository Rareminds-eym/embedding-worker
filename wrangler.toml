name = "embedding-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 9004
inspector_port = 9230

[[kv_namespaces]]
binding = "EMBEDDING_KV"
id = "REPLACE_WITH_LOCAL_KV_ID"

# ═══════════════════════════════════════════════════════════
# DEVELOPMENT
# ═══════════════════════════════════════════════════════════
[env.development]
name = "embedding-worker-dev"

[env.development.vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "https://dev.skillpassports.com"

[[env.development.kv_namespaces]]
binding = "EMBEDDING_KV"
id = "REPLACE_WITH_DEV_KV_ID"

# wrangler secret put ADMIN_KEY          --env development
# wrangler secret put OPENROUTER_API_KEY --env development

# ═══════════════════════════════════════════════════════════
# STAGING
# ═══════════════════════════════════════════════════════════
[env.staging]
name = "embedding-worker-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGINS = "https://stag.skillpassports.com"

[[env.staging.kv_namespaces]]
binding = "EMBEDDING_KV"
id = "REPLACE_WITH_STAGING_KV_ID"

# wrangler secret put ADMIN_KEY          --env staging
# wrangler secret put OPENROUTER_API_KEY --env staging

# ═══════════════════════════════════════════════════════════
# PRODUCTION
# ═══════════════════════════════════════════════════════════
[env.production]
name = "embedding-worker-production"

[env.production.vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://skillpassport.com,https://www.skillpassport.com"

[[env.production.kv_namespaces]]
binding = "EMBEDDING_KV"
id = "REPLACE_WITH_PRODUCTION_KV_ID"

# wrangler secret put ADMIN_KEY          --env production
# wrangler secret put OPENROUTER_API_KEY --env production
